name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:schema:load
        env:
          RAILS_ENV: test

      - name: Run tests
        run: bin/rails test
        env:
          RAILS_ENV: test

      - name: Run system tests
        run: bin/rails test:system
        env:
          RAILS_ENV: test